version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: courier_erp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build:
      context: ../backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/courier_erp?schema=public
      JWT_SECRET: dev-only-change-me-dev-only
      SMS_PROVIDER: mock
    ports:
      - "4000:4000"
    depends_on:
      - db
  frontend:
    build:
      context: ../frontend
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:

